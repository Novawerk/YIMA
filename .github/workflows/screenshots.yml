name: Update Screenshots

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  android-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Record screenshots
        run: ./gradlew :composeApp:recordRoborazziDebug

      - name: Organize screenshots into docs
        run: |
          SRC=composeApp/build/outputs/roborazzi
          DST=docs/screenshots/android
          PREFIX="com.haodong.yimalaile.ScreenshotTest"
          for f in "$SRC"/*.png; do
            name=$(basename "$f" .png | sed "s/${PREFIX}\.//")
            screen=$(echo "$name" | rev | cut -d_ -f3- | rev)
            lang=$(echo "$name" | rev | cut -d_ -f2 | rev)
            theme=$(echo "$name" | rev | cut -d_ -f1 | rev)
            mkdir -p "$DST/$lang/$theme"
            cp "$f" "$DST/$lang/$theme/${screen}.png"
          done

      - name: Upload Android screenshots
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: docs/screenshots/android/

  ios-screenshots:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build KMP framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Prepare framework for Xcode
        run: |
          # Determine SDK name for simulator
          SDK_NAME=$(xcrun --sdk iphonesimulator --show-sdk-version)
          DEST="composeApp/build/xcode-frameworks/Debug/iphonesimulator${SDK_NAME}"
          mkdir -p "$DEST"
          cp -R composeApp/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework "$DEST/"

      - name: Run iOS UI tests
        timeout-minutes: 15
        run: |
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing iosAppUITests \
            -resultBundlePath TestResults.xcresult \
            OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES \
            || true

      - name: Extract screenshots from test results
        run: |
          DST=docs/screenshots/ios
          EXPORT_DIR=$(mktemp -d)
          # Export all test attachments with manifest
          xcrun xcresulttool export attachments \
            --path TestResults.xcresult \
            --output-path "$EXPORT_DIR"
          # Parse manifest.json to organize screenshots by lang/theme
          python3 -c "
          import json, os, shutil, re

          dst = '$DST'
          export_dir = '$EXPORT_DIR'
          manifest = json.load(open(os.path.join(export_dir, 'manifest.json')))

          for test_entry in manifest:
              for att in test_entry.get('attachments', []):
                  suggested = att.get('suggestedHumanReadableName', '')
                  filename = att.get('exportedFileName', '')
                  if not suggested or not filename:
                      continue
                  # suggested is like 'home_calendar_en_light_0_UUID.png'
                  # Strip trailing _0_UUID.png to get the original attachment name
                  name = re.sub(r'_\d+_[0-9A-Fa-f-]+\.png$', '', suggested)
                  # name is now like 'home_calendar_en_light'
                  parts = name.rsplit('_', 2)
                  if len(parts) < 3:
                      continue
                  screen, lang, theme = parts[0], parts[1], parts[2]
                  out_dir = os.path.join(dst, lang, theme)
                  os.makedirs(out_dir, exist_ok=True)
                  src = os.path.join(export_dir, filename)
                  if os.path.exists(src):
                      shutil.copy2(src, os.path.join(out_dir, screen + '.png'))
                      print(f'Exported: {lang}/{theme}/{screen}.png')
          "

      - name: Upload iOS screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: docs/screenshots/ios/

  commit-screenshots:
    needs: [android-screenshots, ios-screenshots]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Android screenshots
        uses: actions/download-artifact@v4
        with:
          name: android-screenshots
          path: docs/screenshots/android/

      - name: Download iOS screenshots
        uses: actions/download-artifact@v4
        with:
          name: ios-screenshots
          path: docs/screenshots/ios/

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update screenshots [skip ci]"
          file_pattern: "docs/screenshots/**/*.png"
