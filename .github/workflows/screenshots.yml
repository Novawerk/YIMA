name: Screenshot Preview

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_ios:
        description: 'Also run iOS screenshots (macOS runner, slow)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Record screenshots
        run: |
          # Retry once on failure (Robolectric may fail to download SDK jars on first try)
          ./gradlew :composeApp:recordRoborazziDebug || ./gradlew :composeApp:recordRoborazziDebug

      - name: Organize screenshots
        run: |
          SRC=composeApp/build/outputs/roborazzi
          DST=screenshots/android
          PREFIX="com.haodong.yimalaile.ScreenshotTest"
          for f in "$SRC"/*.png; do
            name=$(basename "$f" .png | sed "s/${PREFIX}\.//")
            screen=$(echo "$name" | rev | cut -d_ -f3- | rev)
            lang=$(echo "$name" | rev | cut -d_ -f2 | rev)
            theme=$(echo "$name" | rev | cut -d_ -f1 | rev)
            mkdir -p "$DST/$lang/$theme"
            cp "$f" "$DST/$lang/$theme/${screen}.png"
          done

      - name: Upload Android screenshots
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: screenshots/android/

  ios-screenshots:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.include_ios)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Select Xcode and list available simulators
        run: |
          sudo xcode-select -p
          echo "--- Available iPhone simulators ---"
          xcrun simctl list devices available iPhone
          echo "--- iOS runtimes ---"
          xcrun simctl list runtimes iOS

      - name: Boot simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available iPhone -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          preferred = ['iPhone 16 Pro', 'iPhone 16', 'iPhone 15 Pro', 'iPhone 15']
          all_devices = []
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable'):
                      all_devices.append((d['name'], d['udid'], runtime))
          for pref in preferred:
              for name, udid, rt in all_devices:
                  if name == pref:
                      print(udid)
                      sys.exit(0)
          if all_devices:
              print(all_devices[0][1])
              sys.exit(0)
          sys.exit(1)
          ")
          echo "Selected simulator: $DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_ID" || true

      # The "Compile Kotlin Framework" build phase in project.pbxproj forces
      # JAVA_HOME to brew's openjdk@17 location (intended for Xcode Cloud). On
      # GitHub macos-15 runners brew predicts the path but openjdk@17 isn't
      # installed, so JAVA_HOME points to a non-existent directory and gradle
      # fails. Install openjdk@17 to satisfy that assumption.
      - name: Install openjdk@17 (for Xcode build phase)
        run: brew install openjdk@17

      - name: Pre-build KMP framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Run iOS UI tests
        timeout-minutes: 30
        run: |
          # Kotlin/Native compiles ComposeApp against the latest iOS SDK
          # (currently 18.5) and emits a hard reference to UIViewLayoutRegion,
          # which the linker only accepts when the deployment target matches.
          # Override only for the CI test build so production stays at the
          # project-level deployment target.
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -only-testing iosAppUITests \
            -resultBundlePath TestResults.xcresult \
            IPHONEOS_DEPLOYMENT_TARGET=18.5

      - name: Extract screenshots from test results
        run: |
          DST=screenshots/ios
          EXPORT_DIR=$(mktemp -d)
          xcrun xcresulttool export attachments \
            --path TestResults.xcresult \
            --output-path "$EXPORT_DIR"

          if [ ! -f "$EXPORT_DIR/manifest.json" ]; then
            echo "::error::No manifest.json found — screenshot extraction failed"
            exit 1
          fi

          python3 -c "
          import json, os, shutil, re, sys

          dst = '$DST'
          export_dir = '$EXPORT_DIR'
          manifest = json.load(open(os.path.join(export_dir, 'manifest.json')))

          count = 0
          for test_entry in manifest:
              for att in test_entry.get('attachments', []):
                  suggested = att.get('suggestedHumanReadableName', '')
                  filename = att.get('exportedFileName', '')
                  if not suggested or not filename:
                      continue
                  name = re.sub(r'_\d+_[0-9A-Fa-f-]+\.png$', '', suggested)
                  parts = name.rsplit('_', 2)
                  if len(parts) < 3:
                      continue
                  screen, lang, theme = parts[0], parts[1], parts[2]
                  out_dir = os.path.join(dst, lang, theme)
                  os.makedirs(out_dir, exist_ok=True)
                  src = os.path.join(export_dir, filename)
                  if os.path.exists(src):
                      shutil.copy2(src, os.path.join(out_dir, screen + '.png'))
                      print(f'Exported: {lang}/{theme}/{screen}.png')
                      count += 1

          if count == 0:
              print('::error::No screenshots were extracted from test results')
              sys.exit(1)
          print(f'Total: {count} screenshots exported')
          "

      - name: Upload iOS screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/ios/

  # Post a preview comment on PRs
  post-comment:
    if: github.event_name == 'pull_request'
    needs: [android-screenshots]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download Android screenshots
        uses: actions/download-artifact@v4
        with:
          name: android-screenshots
          path: screenshots/android/

      - name: Post screenshot preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function collectScreenshots(baseDir) {
              const result = {};
              if (!fs.existsSync(baseDir)) return result;
              for (const lang of fs.readdirSync(baseDir)) {
                const langDir = path.join(baseDir, lang);
                if (!fs.statSync(langDir).isDirectory()) continue;
                for (const theme of fs.readdirSync(langDir)) {
                  const themeDir = path.join(langDir, theme);
                  if (!fs.statSync(themeDir).isDirectory()) continue;
                  for (const file of fs.readdirSync(themeDir)) {
                    if (!file.endsWith('.png')) continue;
                    const key = `${lang}/${theme}`;
                    if (!result[key]) result[key] = [];
                    result[key].push(file.replace('.png', ''));
                  }
                }
              }
              return result;
            }

            const androidScreenshots = collectScreenshots('screenshots/android');
            const iosScreenshots = collectScreenshots('screenshots/ios');

            const screens = [
              'disclaimer', 'onboarding_welcome', 'onboarding_calendar',
              'home_calendar', 'home_detail', 'home_stats', 'settings',
              'notifications', 'record_detail', 'log_day', 'prediction_detail',
            ];
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## 📱 Screenshot Preview\n\n`;
            body += `> Commit ${context.sha.substring(0, 7)} · [View workflow run](${runUrl})\n\n`;

            for (const combo of ['en/light', 'en/dark', 'zh/light', 'zh/dark']) {
              const [lang, theme] = combo.split('/');
              const label = `${lang.toUpperCase()} · ${theme.charAt(0).toUpperCase() + theme.slice(1)}`;

              const aShots = androidScreenshots[combo] || [];
              const iShots = iosScreenshots[combo] || [];
              if (aShots.length === 0 && iShots.length === 0) continue;

              body += `<details>\n<summary><b>${label}</b></summary>\n\n`;
              body += `| Screen | Android | iOS |\n`;
              body += `|--------|:-------:|:---:|\n`;

              for (const screen of screens) {
                const hasA = aShots.includes(screen);
                const hasI = iShots.includes(screen);
                if (!hasA && !hasI) continue;
                body += `| ${screen.replace(/_/g, ' ')} | ${hasA ? '✅' : '—'} | ${hasI ? '✅' : '—'} |\n`;
              }

              body += `\n</details>\n\n`;
            }

            body += `\n📦 **[Download full-resolution screenshots](${runUrl}#artifacts)** (android-screenshots + ios-screenshots)\n`;

            // Upsert comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## 📱 Screenshot Preview';
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }

  # On release or manual dispatch (with iOS): commit refreshed screenshots back to main.
  # Writes:
  #   docs/screenshots/{android,ios}/<NN>-<screen>[-zh].png   — curated EN/ZH light-mode subset (referenced by README)
  #   docs/screenshots/ci/{android,ios}/<lang>/<theme>/...    — full 4-variant grid (regression reference)
  commit-screenshots-to-main:
    # Run whenever Android succeeded on a release or manual full-run. Tolerates
    # iOS failure so a broken iOS build doesn't block refreshing Android shots.
    if: |
      always() && needs.android-screenshots.result == 'success' && (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.include_ios)
      )
    needs: [android-screenshots, ios-screenshots]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android screenshots
        uses: actions/download-artifact@v4
        with:
          name: android-screenshots
          path: /tmp/downloaded-screenshots/android/

      - name: Download iOS screenshots
        if: needs.ios-screenshots.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ios-screenshots
          path: /tmp/downloaded-screenshots/ios/

      - name: Curate + refresh screenshots
        run: |
          set -euo pipefail

          HAS_IOS=0
          [ -d /tmp/downloaded-screenshots/ios ] && [ -n "$(ls /tmp/downloaded-screenshots/ios 2>/dev/null)" ] && HAS_IOS=1

          # Wipe old android + ci/android so renames/removals propagate.
          rm -rf docs/screenshots/android docs/screenshots/ci/android
          mkdir -p docs/screenshots/android docs/screenshots/ci/android

          # Full 4-variant grid (lang/theme/screen.png) — android always.
          cp -R /tmp/downloaded-screenshots/android/. docs/screenshots/ci/android/

          if [ "$HAS_IOS" = 1 ]; then
            rm -rf docs/screenshots/ios docs/screenshots/ci/ios
            mkdir -p docs/screenshots/ios docs/screenshots/ci/ios
            cp -R /tmp/downloaded-screenshots/ios/. docs/screenshots/ci/ios/
          else
            echo "::warning::iOS artifact missing — refreshing Android only."
          fi

          # Curated subset: light mode only, EN + ZH, mapped to README-friendly flat names.
          # Mapping order matches the README screenshot table.
          curate() {
            local src=$1 dst=$2 platform=$3
            local screens=(
              "home_calendar:01-overview"
              "home_detail:02-detail"
              "home_stats:03-statistics"
              "notifications:04-reminder"
              "settings:05-settings"
            )
            for entry in "${screens[@]}"; do
              local screen="${entry%%:*}"
              local target="${entry##*:}"
              for lang in en zh; do
                local src_file="$src/$lang/light/$screen.png"
                local suffix=""
                [ "$lang" = "zh" ] && suffix="-zh"
                if [ -f "$src_file" ]; then
                  cp "$src_file" "$dst/${target}${suffix}.png"
                else
                  echo "::warning::[$platform] missing $src_file — skipping ${target}${suffix}.png"
                fi
              done
            done
          }

          curate /tmp/downloaded-screenshots/android docs/screenshots/android android
          if [ "$HAS_IOS" = 1 ]; then
            curate /tmp/downloaded-screenshots/ios docs/screenshots/ios ios
          fi

          echo "--- curated android ---"
          ls -la docs/screenshots/android
          if [ "$HAS_IOS" = 1 ]; then
            echo "--- curated ios ---"
            ls -la docs/screenshots/ios
          fi

      - name: Commit refreshed screenshots to main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/screenshots/
          git diff --cached --quiet && echo "No screenshot changes to commit" || {
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            git commit -m "docs: refresh screenshots for ${TAG_NAME} [skip ci]"
            git push origin main
          }
