# Release Workflow
#
# One-button release from main. Triggered manually with workflow_dispatch.
#
#   gh workflow run release.yml -f bump=patch
#
# Bumps versionName (semver) and versionCode in libs.versions.toml +
# Config.xcconfig, commits to main, tags v<version>, creates a GitHub
# Release with auto-generated notes, builds the signed AAB, and uploads
# it to the Play Store internal track.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Compute next version
        id: v
        run: |
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo v0.0.0)
          IFS='.' read -r MAJ MIN PAT <<< "${PREV#v}"
          case "${{ inputs.bump }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          VERSION="$MAJ.$MIN.$PAT"
          CODE=$(($(grep '^app-versionCode' gradle/libs.versions.toml | sed 's/.*"\(.*\)"/\1/') + 1))
          {
            echo "version=$VERSION"
            echo "code=$CODE"
            echo "tag=v$VERSION"
            echo "prev=$PREV"
          } >> "$GITHUB_OUTPUT"
          echo "Release: $PREV -> v$VERSION (code: $CODE)"

      - name: Bump, commit, tag, push
        env:
          V: ${{ steps.v.outputs.version }}
          C: ${{ steps.v.outputs.code }}
          T: ${{ steps.v.outputs.tag }}
        run: |
          sed -i "s/^app-versionName = .*/app-versionName = \"$V\"/" gradle/libs.versions.toml
          sed -i "s/^app-versionCode = .*/app-versionCode = \"$C\"/" gradle/libs.versions.toml
          sed -i "s/MARKETING_VERSION=.*/MARKETING_VERSION=$V/" iosApp/Configuration/Config.xcconfig
          sed -i "s/CURRENT_PROJECT_VERSION=.*/CURRENT_PROJECT_VERSION=$C/" iosApp/Configuration/Config.xcconfig
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/libs.versions.toml iosApp/Configuration/Config.xcconfig
          git commit -m "Release $V"
          git tag "$T"
          git push origin main "$T"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            --target main \
            --title "${{ steps.v.outputs.tag }}" \
            --generate-notes

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          ./gradlew :composeApp:bundleRelease

      - name: Decode Play service account
        run: echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 -d > service-account.json

      - name: Upload to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: com.haodong.yimalaile
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
