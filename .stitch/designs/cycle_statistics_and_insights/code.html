<html lang="zh-CN"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a66e6e",
                        "peach": "#f7cdc3",
                        "rose-light": "#fdf2f0",
                        "background-light": "#fff9f8",
                        "background-dark": "#1b1717",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Epilogue', 'Noto Sans SC', sans-serif;
        }
        .hand-drawn-bar {
            border-radius: 20px 60px 20px 50px / 50px 20px 50px 20px;
        }
        .organic-blob {
            border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
