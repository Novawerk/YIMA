<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>日历记录 — 空状态 (无记录)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:    '#a66d6d',
            accent:     '#f7cdc3',
            background: '#fff9f8',
          },
          fontFamily: {
            sans: ['Public Sans', 'Noto Sans SC', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #fff9f8; min-height: 100vh; }

    .date-blob {
      border-radius: 50% 48% 44% 54% / 50% 46% 54% 50%;
    }
  </style>
</head>
<body class="font-sans flex items-center justify-center">
  <div class="w-[390px] min-h-screen bg-background flex flex-col overflow-hidden px-6 pt-10 pb-8 gap-0">

    <!-- Top Navigation Bar -->
    <div class="flex items-center justify-between mb-6">
      <!-- Back button -->
      <button class="w-[48px] h-[48px] rounded-full flex items-center justify-center"
              style="background:rgba(247,205,195,0.30);" aria-label="返回">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="#a66d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Title -->
      <span class="text-[22px] font-bold" style="color:#a66d6d;">日历记录</span>

      <!-- Spacer -->
      <div class="w-[48px] h-[48px]"></div>
    </div>

    <!-- Month Navigation -->
    <div class="flex items-center justify-between mb-4">
      <!-- Prev month -->
      <button class="w-[48px] h-[48px] rounded-full flex items-center justify-center"
              style="background:rgba(247,205,195,0.30);" aria-label="上个月">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="#a66d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Month label pill -->
      <div class="flex-1 mx-2 py-[14px] date-blob text-center"
           style="background:rgba(166,109,109,0.10);">
        <span class="text-[20px] font-bold" style="color:#a66d6d;">2026年 3月</span>
      </div>

      <!-- Next month -->
      <button class="w-[48px] h-[48px] rounded-full flex items-center justify-center"
              style="background:rgba(247,205,195,0.30);" aria-label="下个月">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="#a66d6d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Calendar Grid Card (muted — no data) -->
    <div class="rounded-[32px] px-4 py-4 mb-5" style="background:rgba(247,205,195,0.20);">
      <!-- Day-of-week headers -->
      <div class="grid grid-cols-7 mb-1">
        <template id="day-headers"></template>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">日</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">一</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">二</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">三</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">四</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">五</div>
        <div class="h-9 flex items-center justify-center text-[12px] font-bold"
             style="color:rgba(166,109,109,0.28);">六</div>
      </div>

      <!-- Calendar days (March 2026: starts Sunday=0) -->
      <div class="grid grid-cols-7 gap-y-1" id="cal-grid">
        <!-- Row 1: March starts Sunday March 1 -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">1</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">2</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">3</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">4</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">5</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">6</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">7</div>
        <!-- Row 2 -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">8</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">9</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">10</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">11</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">12</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">13</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">14</div>
        <!-- Row 3 -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">15</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">16</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">17</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">18</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">19</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">20</div>
        <!-- Today, 21 — slightly more visible as the only "today" indicator -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="background:rgba(247,205,195,0.45); color:rgba(166,109,109,0.55);">21</div>
        <!-- Row 4 -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">22</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">23</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">24</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">25</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">26</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">27</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">28</div>
        <!-- Row 5 -->
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">29</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">30</div>
        <div class="h-9 w-9 mx-auto flex items-center justify-center text-[14px] rounded-full"
             style="color:rgba(166,109,109,0.22);">31</div>
        <div class="h-9 w-9"></div>
        <div class="h-9 w-9"></div>
        <div class="h-9 w-9"></div>
        <div class="h-9 w-9"></div>
      </div>
    </div>

    <!-- Empty State Illustration + Copy -->
    <div class="flex flex-col items-center gap-4 py-4">
      <!-- Glow circle with icon -->
      <div class="w-[120px] h-[120px] rounded-full flex items-center justify-center relative"
           style="background:rgba(247,205,195,0.40);">
        <!-- Calendar icon -->
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="17" rx="2.5" stroke="#a66d6d" stroke-width="1.6" fill="rgba(166,109,109,0.08)"/>
          <path d="M3 9h18" stroke="#a66d6d" stroke-width="1.6"/>
          <path d="M8 2v4M16 2v4" stroke="#a66d6d" stroke-width="1.6" stroke-linecap="round"/>
          <!-- Faint grid lines suggesting emptiness -->
          <line x1="7" y1="13" x2="17" y2="13" stroke="rgba(166,109,109,0.25)" stroke-width="1" stroke-dasharray="2,2"/>
          <line x1="7" y1="17" x2="17" y2="17" stroke="rgba(166,109,109,0.25)" stroke-width="1" stroke-dasharray="2,2"/>
        </svg>
        <!-- Heart badge overlay -->
        <div class="absolute bottom-[18px] right-[16px] w-[22px] h-[22px] rounded-full flex items-center justify-center"
             style="background:#fff9f8;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#a66d6d">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
      </div>

      <!-- Headline -->
      <div class="text-[22px] font-bold text-center" style="color:#a66d6d;">
        还没有记录
      </div>

      <!-- Subtext -->
      <div class="text-[14px] text-center leading-relaxed px-8"
           style="color:rgba(166,109,109,0.60);">
        记录你的第一次经期后<br/>日历将显示你的经期历史
      </div>

      <!-- CTA pill -->
      <button class="px-10 h-[56px] rounded-full text-[18px] font-bold text-white mt-2"
              style="background:#a66d6d; box-shadow:0 6px 20px rgba(166,109,109,0.32);">
        去记录
      </button>
    </div>

  </div>
</body>
</html>
