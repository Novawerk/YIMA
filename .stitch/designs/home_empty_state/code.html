<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>首页 — 空状态 (无记录)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:    '#a66d6d',
            accent:     '#f7cdc3',
            'card-bg1': '#f4dcd6',
            'card-bg2': '#f2ece8',
            background: '#fff9f8',
          },
          fontFamily: {
            sans: ['Public Sans', 'Noto Sans SC', 'sans-serif'],
          },
          borderRadius: {
            blob: '60% 40% 70% 30% / 40% 50% 60% 70%',
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #fff9f8; min-height: 100vh; }

    .watercolor-glow {
      background: radial-gradient(ellipse at center, rgba(247,205,195,0.45) 0%, rgba(255,249,248,0) 70%);
    }

    .hero-blob {
      border-radius: 42% 58% 70% 30% / 40% 50% 60% 60%;
    }

    .card-blob-left {
      border-radius: 40% 60% 70% 30% / 30% 50% 60% 70%;
    }

    .card-blob-right {
      border-radius: 50% 50% 30% 70% / 60% 30% 70% 40%;
    }

    .flower-petal {
      position: absolute;
      width: 28px;
      height: 40px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: rgba(166, 109, 109, 0.22);
      transform-origin: bottom center;
    }
  </style>
</head>
<body class="font-sans flex items-center justify-center">
  <div class="w-[390px] min-h-screen bg-background relative flex flex-col overflow-hidden">

    <!-- Top Navigation -->
    <div class="flex items-center justify-between px-6 pt-10 pb-2">
      <!-- Calendar Button -->
      <button class="w-[52px] h-[52px] rounded-full flex items-center justify-center"
              style="background:rgba(247,205,195,0.30);"
              aria-label="打开日历">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="18" rx="3" stroke="#a66d6d" stroke-width="1.8"/>
          <path d="M3 9h18" stroke="#a66d6d" stroke-width="1.8"/>
          <path d="M8 2v4M16 2v4" stroke="#a66d6d" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="7" y="13" width="3" height="3" rx="0.5" fill="#a66d6d" opacity="0.5"/>
          <rect x="11" y="13" width="3" height="3" rx="0.5" fill="#a66d6d" opacity="0.5"/>
        </svg>
      </button>

      <!-- Title -->
      <span class="text-[20px] font-bold" style="color:rgba(166,109,109,0.85);">姨妈来了</span>

      <!-- Settings Button -->
      <button class="w-[52px] h-[52px] rounded-full flex items-center justify-center"
              style="background:rgba(247,205,195,0.30);"
              aria-label="设置">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="#a66d6d" stroke-width="1.8"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#a66d6d" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Hero Illustration Zone -->
    <div class="flex items-center justify-center pt-8 pb-4 relative">
      <!-- Ambient glow -->
      <div class="absolute w-[340px] h-[340px] watercolor-glow rounded-full"></div>

      <!-- Organic blob container -->
      <div class="hero-blob w-[280px] h-[280px] flex items-center justify-center relative"
           style="background:rgba(166,109,109,0.08);">

        <!-- Flower illustration (CSS-drawn peony) -->
        <div class="relative flex items-center justify-center w-[160px] h-[160px]">
          <!-- Outer ring petals -->
          <div class="flower-petal" style="transform:rotate(0deg) translateY(-48px); background:rgba(166,109,109,0.15);"></div>
          <div class="flower-petal" style="transform:rotate(45deg) translateY(-48px); background:rgba(247,205,195,0.5);"></div>
          <div class="flower-petal" style="transform:rotate(90deg) translateY(-48px); background:rgba(166,109,109,0.15);"></div>
          <div class="flower-petal" style="transform:rotate(135deg) translateY(-48px); background:rgba(247,205,195,0.5);"></div>
          <div class="flower-petal" style="transform:rotate(180deg) translateY(-48px); background:rgba(166,109,109,0.15);"></div>
          <div class="flower-petal" style="transform:rotate(225deg) translateY(-48px); background:rgba(247,205,195,0.5);"></div>
          <div class="flower-petal" style="transform:rotate(270deg) translateY(-48px); background:rgba(166,109,109,0.15);"></div>
          <div class="flower-petal" style="transform:rotate(315deg) translateY(-48px); background:rgba(247,205,195,0.5);"></div>

          <!-- Inner petals -->
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(22deg) translateY(-28px); background:rgba(166,109,109,0.28);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(67deg) translateY(-28px); background:rgba(247,205,195,0.7);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(112deg) translateY(-28px); background:rgba(166,109,109,0.28);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(157deg) translateY(-28px); background:rgba(247,205,195,0.7);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(202deg) translateY(-28px); background:rgba(166,109,109,0.28);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(247deg) translateY(-28px); background:rgba(247,205,195,0.7);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(292deg) translateY(-28px); background:rgba(166,109,109,0.28);"></div>
          <div class="flower-petal w-[20px] h-[28px]" style="transform:rotate(337deg) translateY(-28px); background:rgba(247,205,195,0.7);"></div>

          <!-- Center circle -->
          <div class="w-[36px] h-[36px] rounded-full absolute"
               style="background:rgba(166,109,109,0.45);"></div>
          <div class="w-[18px] h-[18px] rounded-full absolute"
               style="background:rgba(255,249,248,0.9);"></div>
        </div>
      </div>
    </div>

    <!-- Status Text Block -->
    <div class="flex flex-col items-center px-6 gap-2">
      <!-- Empty state headline -->
      <div class="text-[32px] font-extrabold text-center leading-tight" style="color:#a66d6d;">
        还没有记录
      </div>

      <!-- Encouragement subtitle -->
      <div class="text-[18px] font-medium text-center leading-snug"
           style="color:rgba(166,109,109,0.6);">
        开始记录你的第一次经期
      </div>

      <!-- Prediction pill badge -->
      <div class="mt-4 px-6 py-[10px] rounded-full border text-[18px] font-semibold"
           style="background:rgba(247,205,195,0.30); border-color:rgba(247,205,195,0.50); color:rgba(166,109,109,0.80);">
        记录后开始预测
      </div>
    </div>

    <!-- Stat Cards -->
    <div class="flex gap-4 px-6 pt-5">
      <!-- Card A — Cycle Length -->
      <div class="flex-1 h-[130px] flex items-center justify-center card-blob-left"
           style="background:rgba(244,220,214,0.40);">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[15px] font-bold tracking-wide uppercase"
                style="color:rgba(166,109,109,0.50);">周期长度</span>
          <div class="flex items-end gap-1">
            <span class="text-[38px] font-bold leading-none" style="color:#a66d6d;">--</span>
          </div>
        </div>
      </div>

      <!-- Card B — Period Length -->
      <div class="flex-1 h-[130px] flex items-center justify-center card-blob-right"
           style="background:rgba(166,109,109,0.08);">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[15px] font-bold tracking-wide uppercase"
                style="color:rgba(166,109,109,0.50);">经期长度</span>
          <div class="flex items-end gap-1">
            <span class="text-[38px] font-bold leading-none" style="color:#a66d6d;">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Motivational quote banner -->
    <div class="mx-6 mt-4 h-[120px] rounded-[32px] flex items-center justify-center px-8"
         style="background:rgba(247,205,195,0.35);">
      <p class="text-[17px] font-semibold italic text-center leading-relaxed"
         style="color:#a66d6d;">
        记录开始，<br/>健康旅程从今天起 🌸
      </p>
    </div>

    <!-- Spacer to push button down -->
    <div class="flex-1 min-h-[24px]"></div>

    <!-- Primary CTA — fixed at bottom -->
    <div class="px-6 pb-8 pt-4">
      <button class="w-full h-[72px] rounded-[36px] flex items-center justify-center gap-3
                     font-bold text-[22px] text-white"
              style="background:#a66d6d; box-shadow:0 8px 24px rgba(166,109,109,0.38);">
        <!-- Pencil icon -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
                fill="white"/>
        </svg>
        记录经期
      </button>
    </div>
  </div>
</body>
</html>
