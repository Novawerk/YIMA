<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#a66d6d",
                    "peach": "#f7cdc3",
                    "blush": "#f4dcd6",
                    "rose-light": "#fdf2f0",
                    "background-light": "#fff9f8",
                    "coffee": "#5d4037",
                },
                fontFamily: {
                    "display": ["Public Sans", "Noto Sans SC", "sans-serif"],
                    "decorative": ["Ma Shan Zheng", "serif"],
                },
            },
        },
    }
</script>
<style>
    body {
        font-family: 'Public Sans', 'Noto Sans SC', sans-serif;
        min-height: max(884px, 100dvh);
    }
    .organic-blob {
        border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
    }
    .hand-drawn-border {
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        border: 2px solid #a66d6d;
    }
</style>
</head>
<body class="bg-background-light text-coffee min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center p-6 gap-4">
    <button class="flex items-center justify-center size-11 rounded-full bg-peach/40 text-primary" aria-label="返回 / Back">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="text-2xl font-bold text-primary tracking-tight">我的统计</h1>
  </header>

  <!-- Empty state body -->
  <div class="flex-1 flex flex-col items-center justify-center px-8 pb-16 text-center gap-8">

    <!-- Illustration blob -->
    <div class="relative flex items-center justify-center">
      <!-- Ambient glow -->
      <div class="absolute w-48 h-48 rounded-full bg-peach/30 blur-3xl"></div>
      <!-- Main blob -->
      <div class="relative organic-blob bg-peach/50 flex items-center justify-center" style="width: 120px; height: 120px;">
        <span class="material-symbols-outlined text-primary" style="font-size: 48px; font-variation-settings: 'FILL' 0, 'wght' 300;">insert_chart</span>
      </div>
    </div>

    <!-- Text content -->
    <div class="flex flex-col items-center gap-3">
      <h2 class="font-decorative text-2xl text-primary leading-snug">
        还没有足够的数据
      </h2>
      <!-- EN annotation -->
      <p class="text-xs text-primary/40 tracking-wide -mt-1">Not enough data yet</p>
      <p class="text-sm text-primary/60 leading-relaxed max-w-xs">
        记录至少 <strong>2 个完整周期</strong>后，这里将显示您的统计数据
      </p>
      <p class="text-xs text-primary/40 leading-relaxed max-w-xs">
        Stats appear after 2 complete cycles are recorded
      </p>
    </div>

    <!-- Progress badge -->
    <div class="flex items-center gap-2 bg-blush/80 border border-primary/10 px-5 py-2.5 rounded-full">
      <span class="material-symbols-outlined text-primary/60 text-base" style="font-size: 16px;">pending</span>
      <span class="text-sm text-primary/70 font-medium">当前：0 个完整周期</span>
      <span class="text-xs text-primary/40">/ Current: 0 cycles</span>
    </div>

    <!-- CTA button -->
    <button class="w-full flex items-center justify-center gap-3 bg-primary text-white font-bold text-lg rounded-full py-4 px-6 active:scale-95 transition-transform shadow-sm shadow-primary/20 mt-2">
      <span class="material-symbols-outlined">arrow_forward</span>
      <span>去记录</span>
      <span class="text-sm font-normal opacity-70">/ Go Record</span>
    </button>

    <!-- Decorative divider -->
    <div class="w-24 h-0.5 bg-primary/10 hand-drawn-border mt-4 opacity-40"></div>

  </div>

</div>
</body></html>
