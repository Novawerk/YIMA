<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5e5e", // Warm earthy mauve from reference
                        "accent": "#f2d5c4",  // Soft peach/beige
                        "background-light": "#fdf8f5", // Warm off-white
                        "background-dark": "#2d2420",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .hand-drawn-border {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        .blob-shape {
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full max-w-md mx-auto flex-col overflow-hidden shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top Navigation -->
<div class="flex items-center justify-between p-6">
<div class="size-10 flex items-center justify-center rounded-full bg-accent/30 text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div class="size-10 flex items-center justify-center rounded-full bg-accent/30 text-primary">
<span class="material-symbols-outlined">settings</span>
</div>
</div><div class="flex justify-center -mt-4 mb-2">
<p class="text-primary font-medium text-lg tracking-wide">离姨妈还远吗？</p>
</div>
<!-- Hero Section: Status -->
<div class="flex flex-col items-center justify-center py-12 px-6 relative">
<!-- Decorative Blobs -->
<div class="absolute top-0 left-10 w-24 h-24 bg-accent/40 blob-shape -z-10"></div>
<div class="absolute bottom-10 right-10 w-32 h-32 bg-primary/5 blob-shape -z-10"></div>
<div class="relative">
<h1 class="text-[88px] font-bold leading-none tracking-tighter text-primary mb-4">还早</h1>
<div class="absolute -top-4 -right-6 text-primary/40 rotate-12">
<span class="material-symbols-outlined text-4xl">favorite</span>
</div>
</div>
<p class="text-primary/70 text-lg font-medium bg-accent/20 px-6 py-2 rounded-full border border-accent/30">预计 11月10日 (20天后)</p>
</div>
<!-- Stats Section -->
<div class="flex gap-4 px-6 pb-8">
<div class="flex flex-1 flex-col items-center gap-3 p-6 bg-accent/40 hand-drawn-border">
<p class="text-primary/60 text-sm font-semibold uppercase tracking-wider">周期长度</p>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold text-primary">28</span>
<span class="text-primary/60 text-sm">天</span>
</div>
</div>
<div class="flex flex-1 flex-col items-center gap-3 p-6 bg-primary/10 hand-drawn-border">
<p class="text-primary/60 text-sm font-semibold uppercase tracking-wider">经期时长</p>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold text-primary">5</span>
<span class="text-primary/60 text-sm">天</span>
</div>
</div>
</div>
<!-- Decorative Illustration Placeholder -->
<div class="px-8 py-4 flex justify-center">
<div class="w-full h-48 rounded-xl overflow-hidden relative group">
<div class="absolute inset-0 bg-gradient-to-br from-accent/50 to-primary/20 opacity-40"></div>
<img alt="Soft floral abstract illustration" class="w-full h-full object-cover mix-blend-multiply opacity-60" data-alt="Abstract hand-drawn floral pattern in pastel colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4IZ-PoXocZOZArirQJE-aPi_sr62r8qhNdAC2043lKJyE1o2WBGApbu_2rUDb45iVmrV7S0BiSa43WaT-qVkHpqRHTAYdCaeA0oTHUBL5P_uEdw85nXzEd4rXBsByOhqG3aLV7_oLp9ajLdQBCz9mWksxf9xf_a-0BBxrx-2ChGL6fW_8aIcOXVkG5X_eY4ufzfxbWySwhwRpx4Jbu9gx_7QMNo7kajd48DgBx-W5-RrOZKONzCovI8XTC8YYwTb6JSNhZX2Qdv8J"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="text-center px-6">
<p class="text-primary font-medium italic text-sm">"照顾好自己，多喝温水。"</p>
</div>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="mt-auto px-6 pt-4 pb-10">
<button class="w-full h-16 bg-primary text-white rounded-xl font-bold text-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined">edit_note</span>
                记录月经
            </button>
</div>
<!-- Bottom Navigation Bar -->
</div>
</body></html>
