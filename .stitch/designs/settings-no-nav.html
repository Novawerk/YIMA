<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&amp;family=Ma+Shan+Zheng&amp;family=Zhi+Mang+Xing&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#5d4037","accent-pink": "#f4dcd6",
            "background-light": "#fdf8f5","background-dark": "#221610",
          },
          fontFamily: {
            "display": ["Public Sans", "Zhi Mang+Xing", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2.5rem", "full": "9999px" },
        },
      },
    }
  </script>
<style type="text/tailwindcss">
    .hand-drawn-border {
      border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
      border: 2px solid #5d4037;
    }
    .blob-shape-1 {
      border-radius: 60% 40% 70% 30% / 40% 50% 60% 70%;
    }
    .blob-shape-2 {
      border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%;
    }
    .organic-card {
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    }
    .dashed-oval {
      border: 2px dashed #5d4037;
      border-radius: 50% / 50%;
    }
  </style>
<style>
    body {
      min-height: 100dvh;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-primary">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden pb-12">
<header class="px-8 pt-12 pb-6">
<h1 class="text-3xl font-bold tracking-tight text-primary opacity-90">设置</h1>
</header>
<main class="flex flex-col gap-8 px-6">
<section class="flex justify-center">
<div class="w-full max-w-sm bg-accent-pink/40 px-6 py-4 flex items-center justify-between blob-shape-1 border-2 border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">language</span>
<span class="text-lg font-medium">Switch Language</span>
</div>
<span class="material-symbols-outlined text-primary/60">arrow_forward_ios</span>
</div>
</section>
<section class="flex flex-col gap-4">
<div class="flex items-center gap-2 px-2">
<span class="material-symbols-outlined text-primary fill-1">favorite</span>
<h2 class="text-xl font-bold">关于我们</h2>
</div>
<div class="bg-primary/5 p-8 organic-card border border-primary/10">
<p class="text-lg leading-relaxed text-primary/80 italic">
            我们是 <span class="font-bold">Novawerk</span>。在这个追求商业利益的时代，我们想用非盈利的方式去做一些真正能帮助人的事情。这个 App 是我们的一颗种子，希望能给你带来一点点温暖和力量，让你在每一个特别的日子里，都能感受到被温柔地对待。
          </p>
<div class="mt-4 flex justify-end">
<span class="material-symbols-outlined text-primary/30 text-4xl">eco</span>
</div>
</div>
</section>
<section class="flex flex-col gap-6 py-4">
<h2 class="text-xl font-bold px-2">数据管理</h2>
<div class="flex flex-col gap-4 items-center">
<button class="w-full max-w-xs py-4 px-8 dashed-oval text-primary hover:bg-primary/5 transition-colors">
<span class="text-base font-medium">重置月经周期</span>
</button>
<button class="w-full max-w-xs py-4 px-8 dashed-oval text-primary hover:bg-red-50 transition-colors">
<span class="text-base font-medium">清空所有记录</span>
</button>
</div>
</section>
<div class="flex justify-center py-8 opacity-20">
<span class="material-symbols-outlined text-6xl">flare</span>
</div>
</main>
</div>

</body></html>
