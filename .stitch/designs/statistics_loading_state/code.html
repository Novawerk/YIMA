<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#a66d6d",
                    "peach": "#f7cdc3",
                    "blush": "#f4dcd6",
                    "background-light": "#fff9f8",
                    "coffee": "#5d4037",
                },
                fontFamily: {
                    "display": ["Public Sans", "Noto Sans SC", "sans-serif"],
                },
            },
        },
    }
</script>
<style>
    body {
        font-family: 'Public Sans', 'Noto Sans SC', sans-serif;
        min-height: max(884px, 100dvh);
    }
    @keyframes shimmer {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 0.9; }
    }
    .skeleton {
        animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-d1 { animation-delay: 0ms; }
    .skeleton-d2 { animation-delay: 200ms; }
    .skeleton-d3 { animation-delay: 400ms; }
    .skeleton-d4 { animation-delay: 600ms; }
    .skeleton-d5 { animation-delay: 800ms; }
    .skeleton-d6 { animation-delay: 1000ms; }
</style>
</head>
<body class="bg-background-light min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col pb-12">

  <!-- Header -->
  <header class="flex items-center p-6 gap-4">
    <button class="flex items-center justify-center size-11 rounded-full bg-peach/40 text-primary" aria-label="返回 / Back">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <!-- Title skeleton -->
    <div class="skeleton skeleton-d1 h-6 w-24 rounded-full bg-primary/20"></div>
  </header>

  <!-- Skeleton Stat Cards 2×2 -->
  <div class="grid grid-cols-2 gap-3 px-6 mt-2">
    <!-- Card 1 -->
    <div class="bg-blush/70 p-4 rounded-2xl flex flex-col gap-2">
      <div class="skeleton skeleton-d1 h-3 w-16 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d1 h-7 w-12 rounded-full bg-primary/30"></div>
    </div>
    <!-- Card 2 -->
    <div class="bg-peach/30 p-4 rounded-2xl flex flex-col gap-2">
      <div class="skeleton skeleton-d2 h-3 w-14 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d2 h-7 w-10 rounded-full bg-primary/30"></div>
    </div>
    <!-- Card 3 -->
    <div class="bg-peach/30 p-4 rounded-2xl flex flex-col gap-2">
      <div class="skeleton skeleton-d3 h-3 w-16 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d3 h-7 w-12 rounded-full bg-primary/30"></div>
    </div>
    <!-- Card 4 -->
    <div class="bg-blush/70 p-4 rounded-2xl flex flex-col gap-2">
      <div class="skeleton skeleton-d4 h-3 w-14 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d4 h-7 w-12 rounded-full bg-primary/30"></div>
    </div>
  </div>

  <!-- Skeleton Section: Cycle Trend -->
  <section class="mt-8 px-6">
    <!-- Section title skeleton -->
    <div class="flex items-center justify-between mb-4">
      <div class="skeleton skeleton-d1 h-5 w-20 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d2 h-3 w-24 rounded-full bg-primary/15"></div>
    </div>
    <!-- Chart card skeleton -->
    <div class="bg-white/50 p-5 rounded-2xl border border-primary/10 space-y-4">
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d1 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d1 flex-1 h-4 rounded-full bg-peach/70"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d2 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d2 h-4 rounded-full bg-peach/70" style="width: 90%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d3 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d3 h-4 rounded-full bg-peach/70" style="width: 85%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d4 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d4 flex-1 h-4 rounded-full bg-peach/70"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d5 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d5 h-4 rounded-full bg-peach/70" style="width: 88%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d6 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d6 h-4 rounded-full bg-peach/70" style="width: 95%;"></div>
      </div>
    </div>
  </section>

  <!-- Skeleton Section: Period Duration -->
  <section class="mt-6 px-6">
    <div class="flex items-center justify-between mb-4">
      <div class="skeleton skeleton-d2 h-5 w-20 rounded-full bg-primary/20"></div>
      <div class="skeleton skeleton-d3 h-3 w-24 rounded-full bg-primary/15"></div>
    </div>
    <div class="bg-white/50 p-5 rounded-2xl border border-primary/10 space-y-4">
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d1 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d1 h-4 rounded-full bg-peach/60" style="width: 60%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d2 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d2 h-4 rounded-full bg-peach/60" style="width: 75%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d3 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d3 h-4 rounded-full bg-peach/60" style="width: 65%;"></div>
      </div>
      <div class="flex items-center gap-3">
        <div class="skeleton skeleton-d4 h-3 w-4 rounded-full bg-primary/20"></div>
        <div class="skeleton skeleton-d4 h-4 rounded-full bg-peach/60" style="width: 70%;"></div>
      </div>
    </div>
  </section>

</div>
</body></html>
