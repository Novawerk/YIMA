<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5e5e", // Warm earthy mauve
                        "accent": "#f2d5c4",  // Soft peach/beige
                        "background-light": "#fdf8f5", // Warm off-white
                        "background-dark": "#2d2420",
                        "deep-coffee": "#4a3728",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "hand": ["Comic Sans MS", "cursive", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .hand-drawn-border {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        .blob-shape {
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#fdf8f5] dark:bg-[#2d2420] font-display flex items-center justify-center min-h-screen p-4 overflow-hidden">
<!-- Background Overlay (Simulating Screen 3 in background) -->
<div class="fixed inset-0 z-0 bg-background-light dark:bg-background-dark opacity-50 flex flex-col items-center justify-center">
<div class="w-full h-full bg-gradient-to-b from-primary/5 to-transparent"></div>
</div>
<!-- Main Bottom Sheet Dialog -->
<div class="relative z-10 w-full max-w-md bg-[#fdf8f5] dark:bg-background-dark shadow-2xl rounded-3xl overflow-hidden">
<!-- BottomSheetHandle Style Header -->
<div class="flex flex-col items-center pt-3 pb-2">
<div class="h-1.5 w-12 rounded-full bg-primary/20 mb-4"></div>
<h1 class="text-deep-coffee dark:text-slate-100 text-xl font-bold tracking-tight" style="">什么时候来的？</h1>
<button class="flex items-center gap-1 text-primary/60 font-medium mt-1 bg-accent/20 px-4 py-1 rounded-full text-sm hover:bg-accent/40 transition-colors" style="">
    Today, Oct 12
    <span class="material-symbols-outlined text-sm" style="">keyboard_arrow_down</span>
</button>
</div><!-- Quick Date Selector Strip -->
<div class="px-6 py-2 overflow-x-auto custom-scrollbar">
<div class="flex justify-between items-center gap-2">
<button class="flex flex-col items-center min-w-[3.5rem] py-2 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="text-[10px] text-primary/40 uppercase" style="">Oct</span>
<span class="text-sm font-bold text-primary/60" style="">08</span>
</button>
<button class="flex flex-col items-center min-w-[3.5rem] py-2 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="text-[10px] text-primary/40 uppercase" style="">Oct</span>
<span class="text-sm font-bold text-primary/60" style="">09</span>
</button>
<button class="flex flex-col items-center min-w-[3.5rem] py-2 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="text-[10px] text-primary/40 uppercase" style="">Oct</span>
<span class="text-sm font-bold text-primary/60" style="">10</span>
</button>
<button class="flex flex-col items-center min-w-[3.5rem] py-2 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="text-[10px] text-primary/40 uppercase" style="">Oct</span>
<span class="text-sm font-bold text-primary/60" style="">11</span>
</button>
<button class="flex flex-col items-center min-w-[3.5rem] py-2 bg-primary/20 hand-drawn-border border-2 border-primary/30" style="">
<span class="text-[10px] text-primary/60 uppercase font-bold" style="">Today</span>
<span class="text-sm font-bold text-primary" style="">12</span>
</button>
</div>
</div>
<div class="px-6 py-4 space-y-8 max-h-[80vh] overflow-y-auto custom-scrollbar">
<!-- Flow Intensity -->
<section>
<h3 class="text-primary/70 text-sm font-bold mb-4 flex items-center gap-2" style="">
<span class="material-symbols-outlined text-primary text-lg" style="">water_drop</span>
                    经量强度
                </h3>
<div class="flex justify-between gap-3">
<button class="flex-1 flex flex-col items-center p-6 bg-accent/40 hand-drawn-border border-2 border-primary/20" style="">
<span class="material-symbols-outlined text-primary mb-2 text-3xl" style="">opacity</span>
<span class="text-xs font-bold text-primary" style="">少量</span>
</button>
<button class="flex-1 flex flex-col items-center p-6 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="material-symbols-outlined text-primary/60 mb-2 text-3xl" style="">water_drop</span>
<span class="text-xs font-bold text-primary/60" style="">中量</span>
</button>
<button class="flex-1 flex flex-col items-center p-6 bg-primary/5 hand-drawn-border border border-primary/10" style="">
<span class="material-symbols-outlined text-primary/40 mb-2 text-3xl" style="">invert_colors</span>
<span class="text-xs font-bold text-primary/60" style="">多量</span>
</button>
</div>
</section>
<!-- Mood Selection -->
<section>
<h3 class="text-primary/70 text-sm font-bold mb-4 flex items-center gap-2" style="">
<span class="material-symbols-outlined text-primary text-lg" style="">sentiment_satisfied</span>
                    今日心情
                </h3>
<div class="flex justify-around bg-accent/10 p-6 blob-shape"><!-- Happy -->
<button class="flex flex-col items-center opacity-40 hover:opacity-100 transition-opacity" style="">
<svg class="mb-1" height="40" viewBox="0 0 100 100" width="40">
<circle cx="50" cy="50" fill="#d7b9a5" r="45"></circle>
<circle cx="35" cy="40" fill="#2d2420" r="3"></circle>
<circle cx="65" cy="40" fill="#2d2420" r="3"></circle>
<path d="M 35 65 Q 50 75 65 65" fill="none" stroke="#2d2420" stroke-linecap="round" stroke-width="3"></path>
</svg>
<span class="text-[10px] text-primary/60 font-medium" style="">开心</span>
</button>
<!-- Meh -->
<button class="flex flex-col items-center opacity-40 hover:opacity-100 transition-opacity" style="">
<svg class="mb-1" height="40" viewBox="0 0 100 100" width="40">
<circle cx="50" cy="50" fill="#d7b9a5" r="45"></circle>
<circle cx="35" cy="40" fill="#2d2420" r="3"></circle>
<circle cx="65" cy="40" fill="#2d2420" r="3"></circle>
<line stroke="#2d2420" stroke-linecap="round" stroke-width="3" x1="35" x2="65" y1="65" y2="65"></line>
</svg>
<span class="text-[10px] text-primary/60 font-medium" style="">一般</span>
</button>
<!-- Bad -->
<button class="flex flex-col items-center scale-125" style="">
<svg class="mb-1" height="40" viewBox="0 0 100 100" width="40">
<circle cx="50" cy="50" fill="#d7b9a5" r="45"></circle>
<circle cx="35" cy="40" fill="#2d2420" r="3"></circle>
<circle cx="65" cy="40" fill="#2d2420" r="3"></circle>
<path d="M 40 70 Q 50 60 60 70" fill="none" stroke="#2d2420" stroke-linecap="round" stroke-width="3"></path>
</svg>
<span class="text-[10px] text-primary font-bold" style="">低落</span>
</button>
<!-- Busy -->
<button class="flex flex-col items-center opacity-40 hover:opacity-100 transition-opacity" style="">
<svg class="mb-1" height="40" viewBox="0 0 100 100" width="40">
<circle cx="50" cy="50" fill="#d7b9a5" r="45"></circle>
<circle cx="35" cy="45" fill="#2d2420" r="3"></circle>
<circle cx="65" cy="45" fill="#2d2420" r="3"></circle>
<line stroke="#2d2420" stroke-linecap="round" stroke-width="3" x1="35" x2="65" y1="65" y2="65"></line>
<!-- Stress lines -->
<path d="M 40 25 Q 50 20 60 25" fill="none" stroke="#2d2420" stroke-dasharray="3,3" stroke-width="1.5"></path>
</svg>
<span class="text-[10px] text-primary/60 font-medium" style="">难受</span>
</button></div>
</section>
<!-- Symptoms Tags -->
<section>
<h3 class="text-primary/70 text-sm font-bold mb-4 flex items-center gap-2" style="">
<span class="material-symbols-outlined text-primary text-lg" style="">medical_services</span>
                    身体症状
                </h3>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2 hand-drawn-border bg-primary text-white text-xs font-bold flex items-center gap-1" style="">
                        腹痛 <span class="material-symbols-outlined text-xs" style="">check</span>
</button>
<button class="px-5 py-2 hand-drawn-border bg-accent/30 text-primary/70 text-xs font-bold" style="">
                        腰酸
                    </button>
<button class="px-5 py-2 hand-drawn-border bg-accent/30 text-primary/70 text-xs font-bold" style="">
                        头痛
                    </button>
<button class="px-5 py-2 hand-drawn-border bg-accent/60 border border-primary/20 text-primary text-xs font-bold" style="">
                        胸部胀痛
                    </button>
<button class="px-5 py-2 hand-drawn-border bg-accent/30 text-primary/70 text-xs font-bold" style="">
                        疲倦
                    </button>
</div>
</section>
<!-- Note Input Area -->
<section>
<div class="bg-accent/10 rounded-2xl p-6 border-2 border-dashed border-primary/20 blob-shape">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-primary/80 text-sm placeholder:text-primary/30 resize-none h-20" placeholder="写下今天的小心情..."></textarea>
</div>
</section>
</div>
<!-- Action Buttons -->
<div class="p-8 pt-2 bg-[#fdf8f5] dark:bg-background-dark flex flex-col gap-4">
<button class="w-full h-16 bg-primary text-white rounded-xl font-bold text-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform" style="">
                保存记录
            </button>
<button class="w-full py-2 text-primary/40 font-bold uppercase tracking-widest text-xs hover:text-primary transition-colors" style="">
                取消
            </button>
</div>
<!-- Decorative Organic Shape -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl -z-10"></div>
<div class="absolute -top-10 -left-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl -z-10"></div>
</div>
</body></html>
