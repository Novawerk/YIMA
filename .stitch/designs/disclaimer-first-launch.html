<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-brand": "#a66d6d",
                        "cta-color": "#B37D71",
                        "background-light": "#fff9f8",
                        "background-dark": "#1c1716",
                        "peach-soft": "#f7cdc3",
                    },
                    fontFamily: {
                        "display": ["'Public Sans'", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .blob-shape {
            border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
        }
        .hand-drawn-border {
            border: 2px solid rgba(166, 109, 109, 0.3);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col items-center px-6 py-12 max-w-md mx-auto overflow-x-hidden">
<div class="flex flex-col items-center gap-2 mb-10 mt-8">
<div class="flex items-center justify-center bg-primary-brand/10 rounded-full p-4 mb-2">
<span class="material-symbols-outlined text-primary-brand text-4xl">favorite</span>
</div>
<h1 class="text-3xl font-bold text-primary-brand tracking-tight">姨妈来了</h1>
</div>
<div class="relative w-full aspect-square flex flex-col items-center justify-center p-8 mb-10 bg-peach-soft/20 blob-shape hand-drawn-border">
<div class="text-center space-y-4">
<h2 class="text-xl font-bold text-primary-brand">使用须知</h2>
<p class="text-primary-brand/80 leading-relaxed text-base text-center px-4">
                    本应用仅供个人健康追踪参考，不提供医疗建议。预测数据仅供参考，不能替代专业医疗诊断。如有健康问题，请咨询医生。
                </p>
</div>
<div class="absolute bottom-10 right-10">
<span class="material-symbols-outlined text-primary-brand/40 text-3xl">eco</span>
</div>
</div>
<div class="flex items-start gap-3 px-4 mb-12">
<div class="mt-1">
<span class="material-symbols-outlined text-primary-brand/60 text-xl">lock</span>
</div>
<p class="text-primary-brand/70 text-sm leading-relaxed">
                你的所有数据仅保存在本设备上，我们不会收集或上传任何个人信息。
            </p>
</div>
<div class="w-full space-y-6">
<button class="w-full h-16 bg-cta-color hover:opacity-90 transition-opacity rounded-full flex items-center justify-center gap-2 shadow-lg shadow-cta-color/20">
<span class="material-symbols-outlined text-white text-2xl">check_circle</span>
<span class="text-white font-bold text-lg">我已了解，开始使用</span>
</button>
<div class="text-center">
<button class="text-primary-brand/60 text-sm font-medium hover:text-primary-brand transition-colors underline decoration-primary-brand/30 underline-offset-4">
                    查看完整隐私政策
                </button>
</div>
</div>
<div class="fixed -top-20 -left-20 w-64 h-64 bg-peach-soft/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-20 -right-20 w-80 h-80 bg-primary-brand/5 rounded-full blur-3xl pointer-events-none"></div>
</div>

</body></html>
