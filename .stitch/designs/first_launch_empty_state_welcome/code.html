<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a66d6d",
                        "accent": "#f7cdc3",
                        "cta": "#B37D71",
                        "background-light": "#fff9f8",
                        "background-dark": "#1b1717",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .watercolor-glow {
            background: radial-gradient(circle, rgba(166, 109, 109, 0.15) 0%, rgba(255, 249, 248, 0) 70%);
        }
        .organic-shape {
            border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-slate-900 overflow-x-hidden">
<div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto overflow-hidden shadow-2xl bg-background-light">
<!-- Top App Bar -->
<nav class="flex items-center justify-between p-6 pt-12">
<div class="flex size-10 items-center justify-center rounded-full bg-accent/30 text-primary">
<span class="material-symbols-outlined text-[22px]">calendar_today</span>
</div>
<div class="flex size-10 items-center justify-center rounded-full bg-accent/30 text-primary">
<span class="material-symbols-outlined text-[22px]">settings</span>
</div>
</nav>
<!-- Header Section -->
<header class="px-8 pt-8 relative">
<div class="relative inline-block">
<h1 class="text-primary text-[88px] font-bold leading-none tracking-tighter">
                    你好
                </h1>
<span class="material-symbols-outlined absolute -top-2 -right-8 text-primary/40 rotate-12 text-3xl">
                    favorite
                </span>
</div>
<p class="text-primary/60 text-lg font-medium mt-4">
                让我们开始记录你的故事
            </p>
</header>
<!-- Center Content: Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-8">
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Watercolor Glow Blob -->
<div class="absolute inset-0 watercolor-glow organic-shape scale-125"></div>
<!-- Illustration Placeholder -->
<div class="relative z-10 w-64 h-64 flex items-center justify-center">
<div class="w-full h-full bg-no-repeat bg-center bg-contain opacity-80" data-alt="Soft watercolor style blooming flower illustration" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBx92pJP45Y33tQ_XHuFsxLHZoMOaol1nOYvhaWQxkERxW_cihQGjy74pC1yOIT1BU_hXNDcg2cHu0O-liqwKjVnAfIun-iOMPxHSyoU36cwJwmf2laoLvCra_7xF-_VmOCW1AApITUTSaSvYiYkzE8bN_6YxpS3IKvBqXLIO3qHc5_xNrc7YaK4Y_fRBWlYCkJp8v3zgB-SPWOG4JP6nNMIxo5Gl6HyyMdZPfjvAAVfFLbwykSfPeddA0TsFUjxV9Y6LFrWzHJsdE0');">
</div>
</div>
</div>
<!-- Status Badge -->
<div class="mt-8 px-6 py-2 rounded-full bg-accent/20 border border-accent/30">
<span class="text-primary/70 text-sm font-semibold tracking-wide">
                    还没有任何记录
                </span>
</div>
</main>
<!-- Bottom CTA -->
<footer class="p-8 pb-12">
<button class="flex h-16 w-full items-center justify-center gap-3 rounded-full bg-cta text-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl">add_circle</span>
<span class="text-lg font-bold tracking-wide">开始第一次记录</span>
</button>
</footer>
<!-- Decorative Background Elements -->
<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-accent/10 rounded-full blur-3xl -z-10"></div>
<div class="absolute top-40 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl -z-10"></div>
</div>
</body></html>
